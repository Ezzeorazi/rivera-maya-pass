name: Reporte de sargazo diario

on:
  schedule:
    # 10:00 hora de Quintana Roo (UTC-5, sin horario de verano) = 15:00 UTC
    - cron: "0 15 * * *"
  # Permite ejecutarlo manualmente desde la pestaña Actions de GitHub.
  workflow_dispatch:

# Necesario para que la Action pueda hacer commit del JSON actualizado.
permissions:
  contents: write

# Evita ejecuciones solapadas.
concurrency:
  group: sargazo
  cancel-in-progress: false

jobs:
  update-sargazo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install -r scripts/sargazo/requirements.txt
          # Para la predicción de los próximos días (paso opcional, degrada solo).
          pip install -r scripts/sargazo/requirements-ml.txt

      - name: Generar reporte de sargazo
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Opcionales: si están vacíos, el dataset solo se guarda en el CSV.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Opcional: GEMINI_MODEL, SARGAZO_ZONES, SUPABASE_TABLE
        run: python scripts/sargazo/update_sargazo.py

      # Predicción de los próximos días con el modelo entrenado. Si falla o no hay
      # modelo, sale en verde y deja el reporte intacto (no es crítico).
      - name: Predecir próximos días (modelo)
        run: python scripts/sargazo/predict_forecast.py

      - name: Commit y push si hubo cambios
        run: |
          git config user.name "sargazo-bot"
          git config user.email "bot@rivieramayapass.com"
          git add src/data/sargazo-report.json scripts/sargazo/sargazo-history.csv
          if git diff --staged --quiet; then
            echo "Sin cambios en el reporte; no se hace commit."
          else
            git commit -m "chore: actualiza reporte de sargazo $(date -u +%Y-%m-%d)"
            git push
          fi
