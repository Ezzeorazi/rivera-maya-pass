name: Histórico de clima (Fase 2)

# Solo manual: bajás años de viento/temperatura para usar como base de features.
# No es el bot diario. El resultado queda como artifact descargable (no ensucia el repo).
on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Fecha inicio (YYYY-MM-DD)"
        required: false
        default: "2021-01-01"
      end_date:
        description: "Fecha fin (YYYY-MM-DD)"
        required: false
        default: "2025-12-31"

jobs:
  historico:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r scripts/sargazo/requirements-historico.txt

      - name: Bajar histórico de clima
        env:
          HIST_START: ${{ inputs.start_date }}
          HIST_END: ${{ inputs.end_date }}
        run: python scripts/sargazo/fetch_historico.py

      - name: Subir resultado (descargable)
        uses: actions/upload-artifact@v4
        with:
          name: historico-clima-sargazo
          path: |
            scripts/sargazo/historico_clima.csv
            scripts/sargazo/historico_clima.xlsx
          retention-days: 30
